name: turbapka
description: "Android companion app for Turbacz home automation."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.2
  web_socket_channel: ^3.0.1
  http: ^1.2.2
  flutter_web_auth_2: ^4.1.0
  flutter_secure_storage: ^9.2.2
  fl_chart: ^0.69.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  image_path: "../turbacz/static/favicon.ico"
  min_sdk_android: 21
  adaptive_icon_background: "#0B0F1A"
  adaptive_icon_foreground: "../turbacz/static/favicon.ico"
